<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Data Explorer</title>
    <!-- Include XLSX library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Inline CSS Styles -->
    <style>
        /* Enhanced Modern CSS Styles with Adjusted Sizes */
        body {
            font-family: 'Inter', sans-serif;
            /*background: linear-gradient(135deg, #f0f4f8, #d9e2ec);*/
            color: #1F2937;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            max-height: 1000px;
            overflow: auto;
        }

        h2 {
            color: #3498db;
            font-size: 24px;
            margin-bottom: 20px;
            font-weight: 600;
            text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.2);
        }

        /* New styles for the rows */
        .row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            justify-content: center;
            flex-wrap: wrap;
            width: 90%;
            max-width: 1000px;
        }

        #fileInput,
        #searchBox,
        #columnSelect,
        #fileSelect {
            padding: 8px 16px;
            margin: 6px 0;
            border-radius: 25px;
            border: 1px solid #cbd5e1;
            font-size: 14px;
            /* Removed fixed width to allow flexibility */
            flex: 1;
            transition: all 0.3s ease;
            box-sizing: border-box;
            background: #ffffff;
            max-width: 300px;
        }

        #fileInput:hover,
        #searchBox:hover,
        #columnSelect:hover,
        #fileSelect:hover {
            border-color: #7dd3fc;
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.4);
        }

        #fileInput:focus,
        #searchBox:focus,
        #columnSelect:focus,
        #fileSelect:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.5);
        }

        #resultsGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
            margin-top: 20px;
            width: 90%;
            max-width: 1000px;
            padding-bottom: 20px;
            overflow-y: auto;
            max-height: calc(1000px - 260px);
        }

        .card {
            background: #ffffff;
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 6px 10px -3px rgba(0, 0, 0, 0.1),
                0 3px 5px -2px rgba(0, 0, 0, 0.05);
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s ease-in-out;
            position: relative;
            top: 5px;
            border: 1px solid #7dd3fc;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 14px -3px rgba(0, 0, 0, 0.1),
                0 5px 7px -2px rgba(0, 0, 0, 0.05);
        }

        .card-content {
            font-size: 13px;
            color: #374151;
            line-height: 1.4;
        }

        .card-content strong {
            color: #1d4ed8;
        }

        .card-content p {
            margin: 6px 0;
        }

        .back-button {
            background: #3b82f6;
            color: #ffffff;
            padding: 8px 16px;
            font-size: 13px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.3s;
            position: absolute;
            top: 15px;
            left: 15px;
            display: none;
        }

        .back-button:hover {
            background: #2563eb;
        }

        /* Pagination Styles */
        .pagination {
            display: none;
            justify-content: center;
            align-items: center;
            margin-top: 15px;
            gap: 8px;
        }

        .pagination button {
            padding: 8px 16px;
            border: none;
            background: #3b82f6;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.3s, transform 0.3s;
        }

        .pagination button:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }

        .pagination button:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            transform: none;
        }

        .pagination span {
            font-size: 13px;
            color: #1F2937;
        }

        /* Dropdown (ellipsis) menu */
        .dropdown {
            position: absolute;
            top: 10px;
            right: 10px;
            cursor: pointer;
            font-size: 22px;
            color: #94a3b8;
            transition: color 0.3s;
        }

        .dropdown:hover {
            color: #1e293b;
        }

        /* Dropdown content */
        .dropdown-content {
            display: none;
            position: absolute;
            top: 35px;
            right: -5px;
            background: #ffffff;
            box-shadow: 0 6px 10px -3px rgba(0, 0, 0, 0.1),
                0 3px 5px -2px rgba(0, 0, 0, 0.05);
            border-radius: 10px;
            min-width: 180px;
            z-index: 1;
            overflow: hidden;
        }

        /* Display dropdown when clicked */
        .show-dropdown .dropdown-content {
            display: block;
        }

        /* Dropdown items */
        .dropdown-content button {
            background: none;
            border: none;
            padding: 8px 14px;
            width: 100%;
            text-align: left;
            font-size: 13px;
            color: #1F2937;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .dropdown-content button:hover {
            background-color: #f0f4f8;
        }

        .dropdown-content button+button {
            border-top: 1px solid #e5e7eb;
        }

        /* Copied message styles */
        #copiedMessage {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #3b82f6;
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 13px;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 1000;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            #resultsGrid {
                width: 95%;
            }

            .row {
                flex-direction: column;
                align-items: center;
            }

            #fileInput,
            #searchBox,
            #columnSelect,
            #fileSelect {
                width: 80%;
                max-width: none;
            }

            .pagination {
                gap: 6px;
            }

            .pagination button {
                font-size: 11px;
                padding: 6px 10px;
            }

            .card {
                padding: 12px;
            }

            .card-content {
                font-size: 12px;
            }

            .back-button {
                padding: 6px 12px;
                font-size: 11px;
            }
        }

    </style>
</head>

<body>
    <h2>🔍 Data Explorer</h2>

    <!-- Row 1: Upload and Search -->
    <div class="row">
        <input type="file" id="fileInput" accept=".xlsx, .xls" multiple>
        <input type="text" id="searchBox" placeholder="Search..." disabled>
    </div>

    <!-- Row 2: Select File and Select Column -->
    <div class="row">
        <select id="fileSelect" disabled style="display: none;">
            <option value="">Select a Data Group</option>
        </select>
        <select id="columnSelect" disabled>
            <option value="">Search All Columns</option>
        </select>
    </div>

    <div id="resultsGrid"></div>
    <button id="backButton" class="back-button" style="display: none;">← Back to Results</button>

    <!-- Copied message -->
    <div id="copiedMessage">Copied to clipboard!</div>

    <!-- Pagination controls -->
    <div class="pagination">
        <button id="prevPage" disabled>Previous</button>
        <span id="pageNumbers"></span>
        <button id="nextPage" disabled>Next</button>
    </div>

    <!-- JavaScript -->
    <script>
        (function() {
            let dataGroups = []; // Array to hold groups of data
            let currentGroupIndex = null; // Index of the currently selected group
            let filteredData = [];
            let currentPage = 1;
            const itemsPerPage = 12;

            const fileInput = document.getElementById('fileInput');
            const fileSelect = document.getElementById('fileSelect');
            const searchBox = document.getElementById('searchBox');
            const columnSelect = document.getElementById('columnSelect');
            const resultsGrid = document.getElementById('resultsGrid');
            const backButton = document.getElementById('backButton');
            const copiedMessage = document.getElementById('copiedMessage');
            const prevPageButton = document.getElementById('prevPage');
            const nextPageButton = document.getElementById('nextPage');
            const pageNumbers = document.getElementById('pageNumbers');
            const paginationControls = document.querySelector('.pagination');

            // Modified file input event listener to handle multiple files
            fileInput.addEventListener('change', function(event) {
                const files = event.target.files;
                if (!files.length) return;

                dataGroups = []; // Reset data groups array
                fileSelect.innerHTML = '<option value="">Select a Data Group</option>';
                columnSelect.innerHTML = '<option value="">Search All Columns</option>';
                searchBox.value = '';
                searchBox.disabled = true;
                columnSelect.disabled = true;
                fileSelect.disabled = true;
                resultsGrid.innerHTML = '';
                paginationControls.style.display = 'none';
                backButton.style.display = 'none';
                fileSelect.style.display = 'none';

                let filesProcessed = 0;

                let headerMap = {}; // Map to track headers and associated files

                for (let i = 0; i < files.length; i++) {
                    const file = files[i];

                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const arrayBuffer = e.target.result;
                        const dataArray = new Uint8Array(arrayBuffer);
                        const workbook = XLSX.read(dataArray, {
                            type: 'array'
                        });
                        const sheetName = workbook.Sheets['Sheet1'] ? 'Sheet1' : workbook.SheetNames[0];
                        const sheet = workbook.Sheets[sheetName];

                        let fileData = XLSX.utils.sheet_to_json(sheet, {
                            header: 1,
                            defval: ""
                        });

                        if (fileData.length > 0) {
                            const headers = fileData.shift();

                            // Include file name with each row
                            const mappedData = fileData.map(row => ({
                                rowData: row,
                                fileName: file.name // Store the file name here
                            }));

                            const headerKey = JSON.stringify(headers);

                            // **Create Individual Data Group for this File**
                            dataGroups.push({
                                groupId: `file-${file.name}`,
                                groupName: `File: ${file.name}`,
                                fileNames: [file.name],
                                headers: headers,
                                data: mappedData,
                                isCombined: false
                            });

                            // Track headers and associated files
                            if (headerMap[headerKey]) {
                                headerMap[headerKey].files.push(file.name);
                                headerMap[headerKey].data = headerMap[headerKey].data.concat(mappedData);
                            } else {
                                headerMap[headerKey] = {
                                    headers: headers,
                                    files: [file.name],
                                    data: mappedData.slice() // Clone the array
                                };
                            }
                        }

                        filesProcessed++;
                        checkAllFilesProcessed(filesProcessed, files.length);
                    };
                    reader.readAsArrayBuffer(file);
                }

                function checkAllFilesProcessed(processed, total) {
                    if (processed === total) {
                        if (dataGroups.length === 0) {
                            alert('No data found in the selected files.');
                            return;
                        }

                        // Create combined groups for headers that have more than one file
                        for (let key in headerMap) {
                            if (headerMap[key].files.length > 1) {
                                dataGroups.push({
                                    groupId: `combined-${dataGroups.length}`,
                                    groupName: `Combined`,
                                    fileNames: headerMap[key].files,
                                    headers: headerMap[key].headers,
                                    data: headerMap[key].data,
                                    isCombined: true
                                });
                            }
                        }

                        // Populate the fileSelect dropdown if more than one group exists
                        if (dataGroups.length > 1) {
                            // Clear existing options
                            fileSelect.innerHTML = '<option value="">Select a Data Group</option>';

                            dataGroups.forEach((group, index) => {
                                const option = document.createElement('option');
                                option.value = index;
                                option.textContent = group.groupName;
                                fileSelect.appendChild(option);
                            });

                            // Show and enable the file select dropdown
                            fileSelect.style.display = '';
                            fileSelect.disabled = false;
                            fileSelect.removeEventListener('change', handleFileSelectChange);
                            fileSelect.addEventListener('change', handleFileSelectChange);
                        } else {
                            // Only one data group, select it automatically
                            currentGroupIndex = 0;
                            initializeForSelectedGroup();

                            // Hide the file select dropdown since there's only one group
                            fileSelect.style.display = 'none';
                        }
                    }
                }

                function handleFileSelectChange() {
                    currentGroupIndex = this.value !== "" ? parseInt(this.value) : null;
                    if (currentGroupIndex !== null) {
                        initializeForSelectedGroup();
                    } else {
                        // Disable search and column select if no group is selected
                        searchBox.disabled = true;
                        columnSelect.disabled = true;
                        searchBox.value = '';
                        columnSelect.innerHTML = '<option value="">Search All Columns</option>';
                        resultsGrid.innerHTML = '';
                        paginationControls.style.display = 'none';
                    }
                }

                function initializeForSelectedGroup() {
                    const currentGroup = dataGroups[currentGroupIndex];

                    // Populate the column select dropdown
                    columnSelect.innerHTML = '<option value="">Search All Columns</option>';
                    currentGroup.headers.forEach((header, index) => {
                        const option = document.createElement('option');
                        option.value = index;
                        option.textContent = header;
                        columnSelect.appendChild(option);
                    });

                    // Enable the search box and column select
                    searchBox.disabled = false;
                    columnSelect.disabled = false;
                    searchBox.placeholder = "Type to search...";
                    searchBox.value = '';
                    columnSelect.selectedIndex = 0;

                    // Clear previous results
                    resultsGrid.innerHTML = '';
                    paginationControls.style.display = 'none';
                    backButton.style.display = 'none';

                    // Attach event listeners
                    searchBox.removeEventListener('input', searchTable);
                    searchBox.addEventListener('input', debounce(searchTable, 300));
                    columnSelect.removeEventListener('change', searchTable);
                    columnSelect.addEventListener('change', searchTable);
                }
            });

            // Debounce function to optimize search
            function debounce(func, wait) {
                let timeout;
                return function(...args) {
                    clearTimeout(timeout);
                    timeout = setTimeout(() => func.apply(this, args), wait);
                };
            }

            // Search function
            function searchTable() {
                const query = searchBox.value.toLowerCase();
                const selectedColumnIndex = columnSelect.value;

                if (currentGroupIndex === null || query === '') {
                    resultsGrid.style.display = 'none';
                    paginationControls.style.display = 'none';
                    return;
                }

                const currentGroup = dataGroups[currentGroupIndex];
                const data = currentGroup.data;
                const headers = currentGroup.headers;

                filteredData = data
                    .filter(item => {
                        const row = item.rowData;
                        if (selectedColumnIndex !== "") {
                            // Search in the selected column
                            const cell = row[selectedColumnIndex] || "";
                            return cell.toString().toLowerCase().includes(query);
                        } else {
                            // Search in all columns
                            return row.some(cell => cell.toString().toLowerCase().includes(query));
                        }
                    });

                currentPage = 1;
                displayResultsTable(paginateData(filteredData, currentPage), headers);
            }

            // Display results
            function displayResultsTable(pageData, headers) {
                resultsGrid.innerHTML = '';

                // Determine if the current group is a combined group
                const currentGroup = dataGroups[currentGroupIndex];
                const isCombinedGroup = currentGroup.isCombined;

                pageData.forEach((item) => {
                    const {
                        rowData,
                        fileName
                    } = item;
                    const card = document.createElement('div');
                    card.classList.add('card');
                    card.addEventListener('click', () => showSelectedRow(item, headers));

                    const cardContent = document.createElement('div');
                    cardContent.classList.add('card-content');

                    // If the group is combined, show the file name at the top
                    if (isCombinedGroup) {
                        const fileNameElement = document.createElement('p');
                        fileNameElement.innerHTML = `<strong>File:</strong> ${fileName}`;
                        cardContent.appendChild(fileNameElement);
                    }

                    // Display up to the first four pieces of data
                    headers.slice(0, 4).forEach((header, index) => {
                        const p = document.createElement('p');
                        p.innerHTML = `<strong>${header}:</strong> ${rowData[index] !== undefined ? rowData[index] : ""}`;
                        cardContent.appendChild(p);
                    });

                    card.appendChild(cardContent);
                    resultsGrid.appendChild(card);
                });

                resultsGrid.style.display = pageData.length > 0 ? 'grid' : 'none';
                updatePaginationControls();
            }

            // Show selected row details
            function showSelectedRow(item, headers) {
                resultsGrid.innerHTML = '';

                const {
                    rowData,
                    fileName
                } = item;
                const card = document.createElement('div');
                card.classList.add('card');

                const cardContent = document.createElement('div');
                cardContent.classList.add('card-content');

                // Determine if the current group is a combined group
                const currentGroup = dataGroups[currentGroupIndex];
                const isCombinedGroup = currentGroup.isCombined;

                // If the group is combined, show the file name
                if (isCombinedGroup) {
                    const fileNameElement = document.createElement('p');
                    fileNameElement.innerHTML = `<strong>File:</strong> ${fileName}`;
                    cardContent.appendChild(fileNameElement);
                }

                // Display all data
                headers.forEach((header, index) => {
                    const p = document.createElement('p');
                    p.innerHTML = `<strong>${header}:</strong> ${rowData[index] !== undefined ? rowData[index] : ""}`;
                    cardContent.appendChild(p);
                });

                // Add the dropdown menu
                const dropdown = document.createElement('div');
                dropdown.classList.add('dropdown');
                dropdown.innerHTML = '⋮';
                dropdown.addEventListener('click', function(event) {
                    event.stopPropagation();
                    toggleDropdown(dropdown);
                });

                const dropdownContent = document.createElement('div');
                dropdownContent.classList.add('dropdown-content');

                // Copy button
                const copyButton = document.createElement('button');
                copyButton.textContent = 'Copy';
                copyButton.addEventListener('click', function(event) {
                    event.stopPropagation();
                    copyCardData(rowData, headers, fileName);
                    dropdown.classList.remove('show-dropdown');
                });
                dropdownContent.appendChild(copyButton);

                // Share via Email button
                const emailButton = document.createElement('button');
                emailButton.textContent = 'Share via Email';
                emailButton.addEventListener('click', function(event) {
                    event.stopPropagation();
                    shareViaEmail(rowData, headers, fileName);
                    dropdown.classList.remove('show-dropdown');
                });
                dropdownContent.appendChild(emailButton);

                // Share via WhatsApp
                const whatsappButton = document.createElement('button');
                whatsappButton.textContent = 'Share via WhatsApp';
                whatsappButton.addEventListener('click', function(event) {
                    event.stopPropagation();
                    shareViaWhatsApp(rowData, headers, fileName);
                    dropdown.classList.remove('show-dropdown');
                });
                dropdownContent.appendChild(whatsappButton);

                // Share via Telegram
                const telegramButton = document.createElement('button');
                telegramButton.textContent = 'Share via Telegram';
                telegramButton.addEventListener('click', function(event) {
                    event.stopPropagation();
                    shareViaTelegram(rowData, headers, fileName);
                    dropdown.classList.remove('show-dropdown');
                });
                dropdownContent.appendChild(telegramButton);

                dropdown.appendChild(dropdownContent);
                card.appendChild(dropdown);
                card.appendChild(cardContent);

                backButton.style.display = 'block';
                paginationControls.style.display = 'none';

                resultsGrid.appendChild(card);
                resultsGrid.style.display = 'grid';
            }

            // Toggle dropdown menu
            function toggleDropdown(dropdown) {
                const allDropdowns = document.querySelectorAll('.dropdown');
                allDropdowns.forEach(d => {
                    if (d !== dropdown) {
                        d.classList.remove('show-dropdown');
                    }
                });
                dropdown.classList.toggle('show-dropdown');
            }

            // Copy card data to clipboard
            function copyCardData(rowData, headers, fileName) {
                const currentGroup = dataGroups[currentGroupIndex];
                const isCombinedGroup = currentGroup.isCombined;

                let textToCopy = '';
                if (isCombinedGroup) {
                    textToCopy += `File: ${fileName}\n`;
                }
                textToCopy += headers.map((header, index) => `${header}: ${rowData[index] || ''}`).join('\n');

                if (navigator.clipboard) {
                    navigator.clipboard.writeText(textToCopy)
                        .then(() => {
                            showCopiedMessage();
                        })
                        .catch(err => {
                            console.error('Clipboard API failed:', err);
                            useFallbackCopy(textToCopy);
                        });
                } else {
                    useFallbackCopy(textToCopy);
                }
            }

            // Fallback method for copying text
            function useFallbackCopy(text) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                document.body.appendChild(textarea);
                textarea.select();

                try {
                    document.execCommand('copy');
                    showCopiedMessage();
                } catch (err) {
                    alert('Copy to clipboard failed. Please copy manually.');
                } finally {
                    document.body.removeChild(textarea);
                }
            }

            // Show the "Copied" message
            function showCopiedMessage() {
                copiedMessage.style.display = 'block';
                copiedMessage.style.opacity = 1;
                copiedMessage.style.transform = 'translateY(0)';

                setTimeout(() => {
                    copiedMessage.style.opacity = 0;
                    copiedMessage.style.transform = 'translateY(-20px)';
                    setTimeout(() => {
                        copiedMessage.style.display = 'none';
                    }, 300);
                }, 2000);
            }

            // Share via Email
            function shareViaEmail(rowData, headers, fileName) {
                const currentGroup = dataGroups[currentGroupIndex];
                const isCombinedGroup = currentGroup.isCombined;

                let body = '';
                if (isCombinedGroup) {
                    body += `File: ${fileName}\n`;
                }
                body += headers.map((header, index) => `${header}: ${rowData[index] || ''}`).join('\n');

                const subject = encodeURIComponent('Shared Excel Data');
                const emailBody = encodeURIComponent(body);
                window.location.href = `mailto:?subject=${subject}&body=${emailBody}`;
            }

            // Share via WhatsApp
            function shareViaWhatsApp(rowData, headers, fileName) {
                const currentGroup = dataGroups[currentGroupIndex];
                const isCombinedGroup = currentGroup.isCombined;

                let textToShare = '';
                if (isCombinedGroup) {
                    textToShare += `File: ${fileName}\n`;
                }
                textToShare += headers.map((header, index) => `${header}: ${rowData[index] || ''}`).join('\n');

                const url = `https://wa.me/?text=${encodeURIComponent(textToShare)}`;
                window.open(url, '_blank');
            }

            // Share via Telegram
            function shareViaTelegram(rowData, headers, fileName) {
                const currentGroup = dataGroups[currentGroupIndex];
                const isCombinedGroup = currentGroup.isCombined;

                let textToShare = '';
                if (isCombinedGroup) {
                    textToShare += `File: ${fileName}\n`;
                }
                textToShare += headers.map((header, index) => `${header}: ${rowData[index] || ''}`).join('\n');

                const url = `https://t.me/share/url?url=&text=${encodeURIComponent(textToShare)}`;
                window.open(url, '_blank');
            }

            // Show search results after clicking "Back"
            backButton.addEventListener('click', function() {
                backButton.style.display = 'none';
                paginationControls.style.display = filteredData.length > itemsPerPage ? 'flex' : 'none';
                const currentGroup = dataGroups[currentGroupIndex];
                displayResultsTable(paginateData(filteredData, currentPage), currentGroup.headers);
            });

            // Pagination functions
            function paginateData(dataArray, page) {
                const start = (page - 1) * itemsPerPage;
                return dataArray.slice(start, start + itemsPerPage);
            }

            function updatePaginationControls() {
                const totalPages = Math.ceil(filteredData.length / itemsPerPage);

                pageNumbers.innerHTML = `Page ${currentPage} of ${totalPages}`;

                prevPageButton.disabled = currentPage === 1;
                nextPageButton.disabled = currentPage === totalPages || totalPages === 0;

                paginationControls.style.display = totalPages > 1 ? 'flex' : 'none';
            }

            // Pagination button event listeners
            prevPageButton.addEventListener('click', function() {
                if (currentPage > 1) {
                    currentPage -= 1;
                    const currentGroup = dataGroups[currentGroupIndex];
                    displayResultsTable(paginateData(filteredData, currentPage), currentGroup.headers);
                }
            });

            nextPageButton.addEventListener('click', function() {
                const totalPages = Math.ceil(filteredData.length / itemsPerPage);
                if (currentPage < totalPages) {
                    currentPage += 1;
                    const currentGroup = dataGroups[currentGroupIndex];
                    displayResultsTable(paginateData(filteredData, currentPage), currentGroup.headers);
                }
            });

            // Close dropdown when clicking outside
            document.addEventListener('click', function(event) {
                const isDropdown = event.target.matches('.dropdown, .dropdown *');
                if (!isDropdown) {
                    document.querySelectorAll('.dropdown').forEach(dropdown => {
                        dropdown.classList.remove('show-dropdown');
                    });
                }
            });
        })();

    </script>
