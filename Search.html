<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Excel Data Explorer</title>
    <!-- Include XLSX library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Inline CSS Styles -->
    <style>
        /* Enhanced Modern CSS Styles with Reduced Sizes */
        body {
            font-family: 'Inter', sans-serif;
            /*background: linear-gradient(135deg, #f0f4f8, #d9e2ec);*/
            color: #1F2937;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px; /* Reduced padding */
            max-height: 1000px; /* Set the maximum height */
            overflow: auto; /* Enable scrolling if content exceeds max-height */
        }

        h2 {
            color: #0f172a;
            font-weight: 700;
            margin-bottom: 30px; /* Reduced margin */
            text-align: center;
            letter-spacing: 1px;
            font-size: 24px; /* Reduced font size */
        }

        #fileInput,
        #searchBox {
            padding: 10px 18px; /* Reduced padding */
            margin: 8px 0;
            border-radius: 25px;
            border: 1px solid #cbd5e1;
            font-size: 14px; /* Reduced font size */
            width: 320px; /* Reduced width */
            transition: all 0.3s ease;
            box-sizing: border-box;
            background: #ffffff;
        }

        #fileInput:hover,
        #searchBox:hover {
            border-color: #7dd3fc;
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.4);
        }

        #fileInput:focus,
        #searchBox:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.5);
        }

        #resultsGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); /* Reduced min width */
            gap: 20px; /* Reduced gap */
            margin-top: 30px; /* Reduced margin */
            width: 90%;
            max-width: 1000px;
            padding-bottom: 30px; /* Reduced padding */
            overflow-y: auto;
            max-height: calc(1000px - 180px); /* Adjusted for reduced elements */
        }

        .card {
            background: #ffffff;
            border-radius: 12px; /* Reduced border radius */
            padding: 15px; /* Reduced padding */
            box-shadow: 0 6px 10px -3px rgba(0, 0, 0, 0.1),
                        0 3px 5px -2px rgba(0, 0, 0, 0.05);
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s ease-in-out;
            position: relative;
            top: 5px;
            border: 1px solid #7dd3fc;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 14px -3px rgba(0, 0, 0, 0.1),
                        0 5px 7px -2px rgba(0, 0, 0, 0.05);
        }

        .card-content {
            font-size: 14px; /* Reduced font size */
            color: #374151;
            line-height: 1.4;
        }

        .card-content strong {
            color: #1d4ed8;
        }

        .card-content p {
            margin: 8px 0;
        }

        .back-button {
            background: #3b82f6;
            color: #ffffff;
            padding: 10px 20px; /* Reduced padding */
            font-size: 14px; /* Reduced font size */
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.3s;
            position: absolute;
            top: 15px; /* Adjusted position */
            left: 15px;
            display: none;
        }

        .back-button:hover {
            background: #2563eb;
        }

        /* Pagination Styles */
        .pagination {
            display: none;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
            gap: 10px; /* Reduced gap */
        }

        .pagination button {
            padding: 8px 16px; /* Reduced padding */
            border: none;
            background: #3b82f6;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px; /* Reduced font size */
            transition: background 0.3s, transform 0.3s;
        }

        .pagination button:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }

        .pagination button:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            transform: none;
        }

        .pagination span {
            font-size: 14px; /* Reduced font size */
            color: #1F2937;
        }

        /* Dropdown (ellipsis) menu */
        .dropdown {
            position: absolute;
            top: 10px;
            right: 10px;
            cursor: pointer;
            font-size: 24px; /* Reduced font size */
            color: #94a3b8;
            transition: color 0.3s;
        }

        .dropdown:hover {
            color: #1e293b;
        }

        /* Dropdown content */
        .dropdown-content {
            display: none;
            position: absolute;
            top: 35px;
            right: -5px;
            background: #ffffff;
            box-shadow: 0 6px 10px -3px rgba(0, 0, 0, 0.1),
                        0 3px 5px -2px rgba(0, 0, 0, 0.05);
            border-radius: 10px;
            min-width: 180px;
            z-index: 1;
            overflow: hidden;
        }

        /* Display dropdown when clicked */
        .show-dropdown .dropdown-content {
            display: block;
        }

        /* Dropdown items */
        .dropdown-content button {
            background: none;
            border: none;
            padding: 10px 16px; /* Reduced padding */
            width: 100%;
            text-align: left;
            font-size: 14px; /* Reduced font size */
            color: #1F2937;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .dropdown-content button:hover {
            background-color: #f0f4f8;
        }

        .dropdown-content button + button {
            border-top: 1px solid #e5e7eb;
        }

        /* Copied message styles */
        #copiedMessage {
            position: fixed;
            top: 20px; /* Adjusted position */
            left: 50%;
            transform: translateX(-50%);
            background: #3b82f6;
            color: white;
            padding: 10px 20px; /* Reduced padding */
            border-radius: 25px;
            font-size: 14px; /* Reduced font size */
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 1000;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            #resultsGrid {
                width: 95%;
            }

            #fileInput,
            #searchBox {
                width: 80%;
                padding: 10px 15px; /* Reduced padding */
            }

            .pagination {
                gap: 8px;
            }

            .pagination button {
                font-size: 12px; /* Reduced font size */
                padding: 6px 12px;
            }

            .card {
                padding: 15px;
            }

            .card-content {
                font-size: 13px; /* Reduced font size */
            }

            .back-button {
                padding: 8px 16px; /* Reduced padding */
                font-size: 12px; /* Reduced font size */
            }
        }
    </style>
</head>
<body>
    <h2>Excel Data Explorer</h2>
    <input type="file" id="fileInput" accept=".xlsx, .xls">
    <input type="text" id="searchBox" placeholder="Search..." disabled>
    <div id="resultsGrid"></div>
    <button id="backButton" class="back-button" style="display: none;">← Back to Results</button>

    <!-- Copied message -->
    <div id="copiedMessage">Copied to clipboard!</div>

    <!-- Pagination controls -->
    <div class="pagination">
        <button id="prevPage" disabled>Previous</button>
        <span id="pageNumbers"></span>
        <button id="nextPage" disabled>Next</button>
    </div>

    <!-- JavaScript -->
    <script>
        (function() {
            let headers = [];
            let filteredData = [];
            let currentPage = 1;
            const itemsPerPage = 12;
            let data = []; // Initialize data array

            const fileInput = document.getElementById('fileInput');
            const searchBox = document.getElementById('searchBox');
            const resultsGrid = document.getElementById('resultsGrid');
            const backButton = document.getElementById('backButton');
            const copiedMessage = document.getElementById('copiedMessage');
            const prevPageButton = document.getElementById('prevPage');
            const nextPageButton = document.getElementById('nextPage');
            const pageNumbers = document.getElementById('pageNumbers');
            const paginationControls = document.querySelector('.pagination');

            // File input event listener
            fileInput.addEventListener('change', function(event) {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(e) {
                    const arrayBuffer = e.target.result;
                    const dataArray = new Uint8Array(arrayBuffer);
                    const workbook = XLSX.read(dataArray, { type: 'array' });
                    const sheetName = workbook.SheetNames[0];
                    const sheet = workbook.Sheets[sheetName];

                    data = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
                    headers = data.shift();

                    // Enable the search box now that data is loaded
                    searchBox.disabled = false;
                    searchBox.placeholder = "Type to search...";
                    searchBox.addEventListener('input', searchTable);
                };
                reader.readAsArrayBuffer(file);
            });

            // Search function
            function searchTable() {
                const query = searchBox.value.toLowerCase();

                if (!query) {
                    resultsGrid.style.display = 'none';
                    paginationControls.style.display = 'none';
                    return;
                }

                filteredData = data
                    .map((row, index) => ({ rowData: row, originalIndex: index }))
                    .filter(item => item.rowData.some(cell => cell.toString().toLowerCase().includes(query)));

                currentPage = 1;
                displayResultsTable(paginateData(filteredData, currentPage));
            }

            // Display results
            function displayResultsTable(pageData) {
                resultsGrid.innerHTML = '';

                pageData.forEach((item) => {
                    const row = item.rowData;
                    const card = document.createElement('div');
                    card.classList.add('card');
                    card.addEventListener('click', () => showSelectedRow(item.originalIndex));

                    const cardContent = document.createElement('div');
                    cardContent.classList.add('card-content');

                    cardContent.innerHTML = headers.slice(0, 4).map((header, index) =>
                        `<p><strong>${header}:</strong> ${row[index] !== undefined ? row[index] : ""}</p>`
                    ).join('');

                    card.appendChild(cardContent);
                    resultsGrid.appendChild(card);
                });

                resultsGrid.style.display = pageData.length > 0 ? 'grid' : 'none';
                updatePaginationControls();
            }

            // Show selected row details
            function showSelectedRow(originalIndex) {
                resultsGrid.innerHTML = '';

                const card = document.createElement('div');
                card.classList.add('card');

                const cardContent = document.createElement('div');
                cardContent.classList.add('card-content');

                cardContent.innerHTML = headers.map((header, index) =>
                    `<p><strong>${header}:</strong> ${data[originalIndex][index] !== undefined ? data[originalIndex][index] : ""}</p>`
                ).join('');

                // Add the dropdown menu
                const dropdown = document.createElement('div');
                dropdown.classList.add('dropdown');
                dropdown.innerHTML = '⋮';
                dropdown.addEventListener('click', function(event) {
                    event.stopPropagation();
                    toggleDropdown(dropdown);
                });

                const dropdownContent = document.createElement('div');
                dropdownContent.classList.add('dropdown-content');

                // Copy button
                const copyButton = document.createElement('button');
                copyButton.textContent = 'Copy';
                copyButton.addEventListener('click', function(event) {
                    event.stopPropagation();
                    copyCardData(data[originalIndex]);
                    dropdown.classList.remove('show-dropdown');
                });
                dropdownContent.appendChild(copyButton);

                // Share via Email button
                const emailButton = document.createElement('button');
                emailButton.textContent = 'Share via Email';
                emailButton.addEventListener('click', function(event) {
                    event.stopPropagation();
                    shareViaEmail(data[originalIndex]);
                    dropdown.classList.remove('show-dropdown');
                });
                dropdownContent.appendChild(emailButton);

                // Share via WhatsApp
                const whatsappButton = document.createElement('button');
                whatsappButton.textContent = 'Share via WhatsApp';
                whatsappButton.addEventListener('click', function(event) {
                    event.stopPropagation();
                    shareViaWhatsApp(data[originalIndex]);
                    dropdown.classList.remove('show-dropdown');
                });
                dropdownContent.appendChild(whatsappButton);

                // Share via Telegram
                const telegramButton = document.createElement('button');
                telegramButton.textContent = 'Share via Telegram';
                telegramButton.addEventListener('click', function(event) {
                    event.stopPropagation();
                    shareViaTelegram(data[originalIndex]);
                    dropdown.classList.remove('show-dropdown');
                });
                dropdownContent.appendChild(telegramButton);

                dropdown.appendChild(dropdownContent);
                card.appendChild(dropdown);
                card.appendChild(cardContent);

                backButton.style.display = 'block';
                paginationControls.style.display = 'none';

                resultsGrid.appendChild(card);
                resultsGrid.style.display = 'grid';
            }

            // Toggle dropdown menu
            function toggleDropdown(dropdown) {
                const allDropdowns = document.querySelectorAll('.dropdown');
                allDropdowns.forEach(d => {
                    if (d !== dropdown) {
                        d.classList.remove('show-dropdown');
                    }
                });
                dropdown.classList.toggle('show-dropdown');
            }

            // Copy card data to clipboard
            function copyCardData(rowData) {
                const textToCopy = headers.map((header, index) => `${header}: ${rowData[index] || ''}`).join('\n');

                if (navigator.clipboard) {
                    navigator.clipboard.writeText(textToCopy)
                        .then(() => {
                            showCopiedMessage();
                        })
                        .catch(err => {
                            console.error('Clipboard API failed:', err);
                            useFallbackCopy(textToCopy);
                        });
                } else {
                    useFallbackCopy(textToCopy);
                }
            }

            // Fallback method for copying text
            function useFallbackCopy(text) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                document.body.appendChild(textarea);
                textarea.select();

                try {
                    document.execCommand('copy');
                    showCopiedMessage();
                } catch (err) {
                    alert('Copy to clipboard failed. Please copy manually.');
                } finally {
                    document.body.removeChild(textarea);
                }
            }

            // Show the "Copied" message
            function showCopiedMessage() {
                copiedMessage.style.display = 'block';
                copiedMessage.style.opacity = 1;
                copiedMessage.style.transform = 'translateY(0)';

                setTimeout(() => {
                    copiedMessage.style.opacity = 0;
                    copiedMessage.style.transform = 'translateY(-20px)';
                    setTimeout(() => {
                        copiedMessage.style.display = 'none';
                    }, 300);
                }, 2000);
            }

            // Share via Email
            function shareViaEmail(rowData) {
                const subject = encodeURIComponent('Shared Excel Data');
                const body = encodeURIComponent(headers.map((header, index) => `${header}: ${rowData[index] || ''}`).join('\n'));
                window.location.href = `mailto:?subject=${subject}&body=${body}`;
            }

            // Share via WhatsApp
            function shareViaWhatsApp(rowData) {
                const textToShare = headers.map((header, index) => `${header}: ${rowData[index] || ''}`).join('\n');
                const url = `https://wa.me/?text=${encodeURIComponent(textToShare)}`;
                window.open(url, '_blank');
            }

            // Share via Telegram
            function shareViaTelegram(rowData) {
                const textToShare = headers.map((header, index) => `${header}: ${rowData[index] || ''}`).join('\n');
                const url = `https://t.me/share/url?url=&text=${encodeURIComponent(textToShare)}`;
                window.open(url, '_blank');
            }

            // Show search results after clicking "Back"
            backButton.addEventListener('click', function() {
                backButton.style.display = 'none';
                paginationControls.style.display = filteredData.length > itemsPerPage ? 'flex' : 'none';
                displayResultsTable(paginateData(filteredData, currentPage));
            });

            // Pagination functions
            function paginateData(dataArray, page) {
                const start = (page - 1) * itemsPerPage;
                return dataArray.slice(start, start + itemsPerPage);
            }

            function updatePaginationControls() {
                const totalPages = Math.ceil(filteredData.length / itemsPerPage);

                pageNumbers.innerHTML = `Page ${currentPage} of ${totalPages}`;

                prevPageButton.disabled = currentPage === 1;
                nextPageButton.disabled = currentPage === totalPages || totalPages === 0;

                paginationControls.style.display = totalPages > 1 ? 'flex' : 'none';
            }

            // Pagination button event listeners
            prevPageButton.addEventListener('click', function() {
                if (currentPage > 1) {
                    currentPage -= 1;
                    displayResultsTable(paginateData(filteredData, currentPage));
                }
            });

            nextPageButton.addEventListener('click', function() {
                const totalPages = Math.ceil(filteredData.length / itemsPerPage);
                if (currentPage < totalPages) {
                    currentPage += 1;
                    displayResultsTable(paginateData(filteredData, currentPage));
                }
            });

            // Close dropdown when clicking outside
            document.addEventListener('click', function(event) {
                const isDropdown = event.target.matches('.dropdown, .dropdown *');
                if (!isDropdown) {
                    document.querySelectorAll('.dropdown').forEach(dropdown => {
                        dropdown.classList.remove('show-dropdown');
                    });
                }
            });
        })();
    </script>
</body>
</html>
