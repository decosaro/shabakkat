<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Search</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Global Styles */
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f7fa;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding-top: 50px;
            transition: background-color 0.3s ease;
        }

        h2 {
            color: #333;
            font-weight: 600;
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        input {
            padding: 12px 20px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 16px;
            width: 360px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #4CAF50;
            outline: none;
        }

        #resultsGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 40px;
            width: 80%;
            transition: all 0.3s ease-in-out;
        }

        .card {
            background-color: #fff;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease-in-out;
            position: relative;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        .card-header {
            font-size: 18px;
            font-weight: 500;
            color: #333;
            margin-bottom: 10px;
        }

        .card-content {
            font-size: 14px;
            color: #555;
            line-height: 1.6;
        }

        .card-content p {
            margin: 8px 0;
        }

        .card-content strong {
            color: #4CAF50;
        }

        .back-button {
            background-color: #4CAF50;
            color: white;
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
            position: absolute;
            top: 20px;
            left: 20px;
            display: none;
        }

        .back-button:hover {
            background-color: #45a049;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 40px;
            gap: 12px;
        }

        .pagination button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s, transform 0.3s;
        }

        .pagination button:hover {
            background-color: #45a049;
            transform: scale(1.1);
        }

        .pagination button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .pagination .current-page {
            font-weight: 600;
            color: #4CAF50;
        }

        /* Dropdown (three dots menu) */
        .dropdown {
            position: absolute;
            top: 15px;
            right: 15px;
            cursor: pointer;
            font-size: 24px;
            color: #333;
            transition: transform 0.3s ease;
        }

        .dropdown:hover {
            transform: rotate(90deg);
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 40px;
            right: 0;
            background-color: #fff;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            width: 160px;
            z-index: 1;
        }

        .show-dropdown .dropdown-content {
            display: block;
        }

        .dropdown-content button {
            background-color: #fff;
            padding: 12px 20px;
            text-align: left;
            font-size: 16px;
            color: #333;
            border: none;
            width: 100%;
            cursor: pointer;
            border-bottom: 1px solid #eee;
            transition: background-color 0.3s ease;
            border-radius: 8px;
        }

        .dropdown-content button:hover {
            background-color: #f0f0f0;
        }

        .dropdown-content button:last-child {
            border-bottom: none;
        }

        /* Copied message */
        #copiedMessage {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #4CAF50;
            color: white;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 50px;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            #resultsGrid {
                width: 95%;
            }

            input {
                width: 80%;
                padding: 12px;
            }

            .pagination button {
                padding: 8px 16px;
                font-size: 14px;
            }

            .card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <h2>Upload and Search Excel File</h2>
    <input type="file" id="fileInput" accept=".xlsx, .xls">
    <input type="text" id="searchBox" placeholder="Search..." oninput="searchTable()">
    <div id="resultsGrid"></div>
    <button id="backButton" class="back-button" onclick="showSearchResults()">Back to Results</button>

    <div id="copiedMessage">Copied!</div>

    <div class="pagination">
        <button id="prevPage" onclick="changePage(-1)" disabled>Previous</button>
        <span id="pageNumbers"></span>
        <button id="nextPage" onclick="changePage(1)" disabled>Next</button>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let data = [];
            let headers = [];
            let filteredData = [];
            let currentPage = 1;
            const itemsPerPage = 12;
            let previousClickedRow = null;

            document.getElementById('fileInput').addEventListener('change', function(event) {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(e) {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheetName = workbook.SheetNames[0];
                    const sheet = workbook.Sheets[sheetName];

                    window.data = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
                    headers = window.data.shift();
                    document.getElementById('resultsGrid').style.display = 'none';
                };
                reader.readAsArrayBuffer(file);
            });

            function displayResultsTable(pageData) {
                const grid = document.getElementById('resultsGrid');
                grid.innerHTML = '';

                pageData.forEach((item, rowIndex) => {
                    const row = item.rowData;
                    const card = document.createElement('div');
                    card.classList.add('card');
                    card.addEventListener('click', () => showSelectedRow(item.originalIndex));

                    const cardContent = document.createElement('div');
                    cardContent.classList.add('card-content');

                    cardContent.innerHTML = headers.slice(0, 4).map((header, index) => 
                        `<p><strong>${header}:</strong> ${row[index] !== undefined ? row[index] : ""}</p>`
                    ).join('');

                    card.appendChild(cardContent);
                    grid.appendChild(card);
                });

                grid.style.display = pageData.length > 0 ? 'grid' : 'none';
                updatePaginationControls();
            }

            function showSelectedRow(originalIndex) {
                previousClickedRow = originalIndex;

                const grid = document.getElementById('resultsGrid');
                grid.innerHTML = '';

                const card = document.createElement('div');
                card.classList.add('card');

                const cardContent = document.createElement('div');
                cardContent.classList.add('card-content');

                cardContent.innerHTML = headers.map((header, index) => 
                    `<p><strong>${header}:</strong> ${window.data[originalIndex][index] !== undefined ? window.data[originalIndex][index] : ""}</p>`
                ).join('');

                const dropdown = document.createElement('div');
                dropdown.classList.add('dropdown');
                dropdown.innerHTML = '⋮';
                dropdown.addEventListener('click', function(event) {
                    event.stopPropagation();
                    toggleDropdown(dropdown);
                });

                const dropdownContent = document.createElement('div');
                dropdownContent.classList.add('dropdown-content');
                const copyButton = document.createElement('button');
                copyButton.textContent = 'Copy';
                copyButton.addEventListener('click', function() {
                    copyCardData(window.data[originalIndex]);
                });

                const shareButton = document.createElement('button');
                shareButton.textContent = 'Share';
                shareButton.addEventListener('click', function() {
                    shareViaWeb(window.data[originalIndex]);
                });

                dropdownContent.appendChild(copyButton);
                dropdownContent.appendChild(shareButton);

                dropdown.appendChild(dropdownContent);
                card.appendChild(dropdown);

                card.appendChild(cardContent);

                document.getElementById('backButton').style.display = 'block';
                document.querySelector('.pagination').style.display = 'none';

                grid.appendChild(card);
                grid.style.display = 'grid';
            }

            function toggleDropdown(dropdown) {
                const allDropdowns = document.querySelectorAll('.dropdown');
                allDropdowns.forEach(d => {
                    if (d !== dropdown) {
                        d.classList.remove('show-dropdown');
                    }
                });
                dropdown.classList.toggle('show-dropdown');
            }

            function copyCardData(rowData) {
                const textToCopy = headers.map((header, index) => `${header}: ${rowData[index] || ''}`).join('\n');
                navigator.clipboard.writeText(textToCopy)
                    .then(() => {
                        showCopiedMessage();
                    })
                    .catch(err => alert('Failed to copy text: ' + err));
            }

            function shareViaWeb(rowData) {
                const textToShare = headers.map((header, index) => `${header}: ${rowData[index] || ''}`).join('\n');

                if (navigator.share) {
                    navigator.share({
                        title: 'Excel Data',
                        text: textToShare,
                    })
                    .then(() => console.log('Data shared successfully'))
                    .catch(err => console.error('Error sharing data: ', err));
                } else {
                    alert("Web Share API is not supported in your browser.");
                }
            }

            function showCopiedMessage() {
                const copiedMessage = document.getElementById('copiedMessage');
                copiedMessage.style.display = 'block';
                copiedMessage.style.opacity = 1;

                setTimeout(() => {
                    copiedMessage.style.opacity = 0;
                    setTimeout(() => {
                        copiedMessage.style.display = 'none';
                    }, 300);
                }, 2000);
            }

            window.showSearchResults = function() {
                document.getElementById('backButton').style.display = 'none';
                currentPage = 1;
                displayResultsTable(paginateData(filteredData, currentPage));
                document.querySelector('.pagination').style.display = 'flex';
            }

            window.searchTable = function() {
                const query = document.getElementById('searchBox').value.toLowerCase();
                filteredData = window.data
                    .map((row, index) => ({ rowData: row, originalIndex: index }))
                    .filter(item => item.rowData.some(cell => cell.toString().toLowerCase().includes(query)));

                displayResultsTable(paginateData(filteredData, currentPage));
            }

            function paginateData(data, page) {
                const start = (page - 1) * itemsPerPage;
                return data.slice(start, start + itemsPerPage);
            }

            function updatePaginationControls() {
                const totalPages = Math.ceil(filteredData.length / itemsPerPage);
                const prevPageButton = document.getElementById('prevPage');
                const nextPageButton = document.getElementById('nextPage');
                const pageNumbers = document.getElementById('pageNumbers');

                pageNumbers.innerHTML = `Page ${currentPage} of ${totalPages}`;

                prevPageButton.disabled = currentPage === 1;
                nextPageButton.disabled = currentPage === totalPages;
            }

            window.changePage = function(direction) {
                currentPage += direction;
                displayResultsTable(paginateData(filteredData, currentPage));
            }
        });
    </script>
</body>
</html>
